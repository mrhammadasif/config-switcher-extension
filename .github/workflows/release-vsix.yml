name: Release VSIX

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - src/**
      - test/**
      - tsconfig.json
      - .vscodeignore
      - .github/workflows/release-vsix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check package version change
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const { execFileSync } = require("node:child_process");

            const currentPackage = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const currentVersion = currentPackage.version;
            const currentName = currentPackage.name;
            const tag = `v${currentVersion}`;
            const assetName = `${currentName}-${currentVersion}.vsix`;
            const beforeSha = context.payload.before;
            const isManual = context.eventName === "workflow_dispatch";
            const zeroSha = /^0+$/.test(beforeSha ?? "");

            let previousVersion = "";
            if (!isManual && beforeSha && !zeroSha) {
              try {
                const previousPackageJson = execFileSync(
                  "git",
                  ["show", `${beforeSha}:package.json`],
                  { encoding: "utf8" },
                );
                previousVersion = JSON.parse(previousPackageJson).version;
              } catch (error) {
                core.warning(`Could not read previous package.json: ${error.message}`);
              }
            }

            const versionChanged = previousVersion !== currentVersion;
            let assetExists = false;

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              assetExists = release.data.assets.some((asset) => asset.name === assetName);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const shouldRelease = isManual || versionChanged || !assetExists;
            core.setOutput("changed", String(shouldRelease));
            core.setOutput("version", currentVersion);
            core.setOutput("tag", tag);
            core.setOutput("asset_name", assetName);
            core.setOutput("package_name", currentName);

            if (!shouldRelease) {
              core.notice(`Release asset ${assetName} already exists for ${tag}; skipping release.`);
            } else if (!versionChanged && !isManual) {
              core.notice(`package.json version did not change, but ${assetName} is missing; retrying release.`);
            }

      - name: Setup Node
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Test
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Package VSIX
        if: steps.version.outputs.changed == 'true'
        run: npx --yes @vscode/vsce package --out "${{ steps.version.outputs.asset_name }}"

      - name: Create or update GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          ASSET_NAME: ${{ steps.version.outputs.asset_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$ASSET_NAME" --title "$TAG_NAME" --notes "Release $TAG_NAME"
          fi
